
# Sets default memory used for gradle commands. Can be overridden by user or command line properties.
# This is required to provide enough memory for the Minecraft decompilation process.
org.gradle.jvmargs=-Xmx7G
org.gradle.daemon=true
org.gradle.parallel=true

# =========================
# mod version configuration
# =========================

minecraft_version=1.20.1

# base version, follow the semver specification
mod_version = 1.0.0

# internal/nightly/alpha/beta/rc/release
channel = release
git_version = 2.47.0.windows.2

# only works for alpha/beta/rc build, the serial number
snapshot_serial = 0

# internal code
internal_code = TFTL

curios_version =5.2.0-beta.3
jei_minecraft_version=1.20.1
mixin_version=0.8.5
mixingradle_version = 0.7.+
jei_version=15.2.0.22

create_version = 6.0.8-289
ponder_version = 1.0.91
flywheel_version = 1.0.5
registrate_version = MC1.20-1.3.3

kasuga_lib_channel = releases
kasuga_lib_version = 1.20.1-0.22.0-create
systemProp.http.proxyHost=127.0.0.1
systemProp.http.proxyPort=7897
systemProp.https.proxyHost=127.0.0.1
systemProp.https.proxyPort=7897
